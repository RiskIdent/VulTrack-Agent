---
- name: Set release architecture (amd64 only)
  ansible.builtin.set_fact:
    _vultrack_agent_arch: "amd64"

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - vultrack_agent_server_url | length > 0
    fail_msg: "vultrack_agent_server_url must be set"

- name: Validate enrollment variables
  ansible.builtin.assert:
    that:
      - vultrack_agent_enrollment_key | length > 0
    fail_msg: "vultrack_agent_enrollment_key must be set when vultrack_agent_enroll is true"
  when: vultrack_agent_enroll | bool

- name: Validate install method
  ansible.builtin.assert:
    that:
      - vultrack_agent_install_method in ["deb", "binary"]
    fail_msg: "vultrack_agent_install_method must be 'deb' or 'binary'"

- name: Create vultrack-agent system user
  ansible.builtin.user:
    name: vultrack-agent
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false
    comment: VulTrack Agent
    state: present

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ vultrack_agent_config_dir }}"
    state: directory
    owner: root
    group: vultrack-agent
    mode: "0750"

- name: Ensure data directory exists
  ansible.builtin.file:
    path: /var/lib/vultrack-agent
    state: directory
    owner: vultrack-agent
    group: vultrack-agent
    mode: "0750"

- name: Install via Debian package
  ansible.builtin.include_tasks: install_deb.yml
  when: vultrack_agent_install_method == "deb"

- name: Install via binary
  ansible.builtin.include_tasks: install_binary.yml
  when: vultrack_agent_install_method == "binary"

- name: Deploy configuration file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ vultrack_agent_config_file }}"
    owner: root
    group: vultrack-agent
    mode: "0640"
  notify: Restart vultrack-agent

- name: Enroll agent with VulTrack server
  ansible.builtin.command:
    argv:
      - "{{ vultrack_agent_bin_path }}"
      - enroll
      - --enrollment-key
      - "{{ vultrack_agent_enrollment_key }}"
    creates: "{{ vultrack_agent_token_file }}"
  when: vultrack_agent_enroll | bool
  no_log: true

- name: Ensure token file has correct permissions
  ansible.builtin.file:
    path: "{{ vultrack_agent_token_file }}"
    owner: vultrack-agent
    group: vultrack-agent
    mode: "0600"
  when: vultrack_agent_enroll | bool

- name: Ensure vultrack-agent service is in desired state
  ansible.builtin.systemd:
    name: vultrack-agent
    state: "{{ vultrack_agent_service_state }}"
    enabled: "{{ vultrack_agent_service_enabled }}"
    daemon_reload: true
